<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KNOTI'S FAMILY</title>
  <link rel="stylesheet" href="styles2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/login">Login</a>
  </nav>

  <div class="login-container">
    <div class="login-icon">🕊️</div>
    <h2>Family Login</h2>
    <p class="login-sub">Welcome back to KNOTI'S FAMILY</p>

    <div id="msg"></div>

    <form action="/login" method="POST">
      <input type="email" name="email" placeholder="Email" required autofocus>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login ✝️</button>
    </form>

    <p style="margin-top:16px; color:#555; font-size:14px;">
      No account? <a href="/register" style="color:#2ca8a8;">Register here</a>
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const msg = document.getElementById('msg');
    if (params.get('error')) {
      msg.innerHTML = `<p style="color:red;font-weight:bold;">${params.get('error')}</p>`;
    }
    if (params.get('success')) {
      msg.innerHTML = `<p style="color:green;font-weight:bold;">${params.get('success')}</p>`;
    }
  </script>
</body>
</html>
