<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
   <link rel="stylesheet" href="styles2.css">
</head>
<body>

  <nav>
  <a href="index.html">Home</a> |
  <a href="login.html">Login</a> |
  <a href="dollar.html">Family </a>
</nav>

<h2>Login</h2>

<form onsubmit="login(event)">
  <input type="text" id="username" placeholder="Username" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>

  <button type="submit">Login</button>
</form>

<p id="message"></p>

<script>
  // Prevent skipping command page
  if (sessionStorage.getItem("commandPassed") !== "true") {
    window.location.href = "index.html";
  }

  function login(event) {
    event.preventDefault(); // 👈 stops page reload

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "Aloysius" && pass === "1234") {
      sessionStorage.setItem("loggedIn", "true");
      window.location.href = "dollar.html";
    } else {
      document.getElementById("message").innerText = "Wrong login details!";
    }
  }
</script>

</body>
</html>
