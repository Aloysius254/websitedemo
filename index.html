<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Access - Kinoti Family</title>
  <link rel="stylesheet" href="styles2.css">
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="family.html">Family</a>
  </nav>

  <!-- Command container -->
  <div class="login-container">
    <h2>Enter Command to Continue</h2>

    <form onsubmit="checkCommand(event)">
      <input
        type="text"
        id="command"
        placeholder="Enter command"
        required
        autofocus
      >
      <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
  </div>

  <script>
    // Simple hash check — avoids plain-text credential in source
    async function hashString(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkCommand(event) {
      event.preventDefault();
      const command = document.getElementById("command").value;
      const hashed = await hashString(command);
      // SHA-256 of "ACCESS123"
      const expected = "b27dd61b3657cb1526ac291d6509283da9149c1ce8b908b5bde3172fbf78272b";
      if (hashed === expected) {
        sessionStorage.setItem("commandPassed", "true");
        window.location.href = "login.html";
      } else {
        document.getElementById("message").innerText = "Invalid command!";
      }
    }
  </script>

</body>
</html>
