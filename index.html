<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Access - Kinoti Family</title>
  <link rel="stylesheet" href="styles2.css">
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="dollar.html">Family</a>
  </nav>

  <!-- Command container -->
  <div class="login-container">
    <h2>Enter Command to Continue</h2>

    <form onsubmit="checkCommand(event)">
      <input
        type="text"
        id="command"
        placeholder="Enter command"
        required
        autofocus
      >
      <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
  </div>

  <script>
    function checkCommand(event) {
      event.preventDefault(); // stops page reload

      const command = document.getElementById("command").value;

      if (command === "ACCESS123") {
        sessionStorage.setItem("commandPassed", "true");
        window.location.href = "login.html";
      } else {
        document.getElementById("message").innerText = "Invalid command!";
      }
    }
  </script>

</body>
</html>
